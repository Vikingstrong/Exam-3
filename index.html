<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam 3</title>
    <link rel="stylesheet" href="src/output.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body class="bg-[#030303] text-white">
    <header class="max-w-300 m-auto p-5 lg:px-0 justify-between items-center flex text-white">
        <img src="src/img/pg1/header/logo.png" alt="">
        <i class="lg:hidden! text-white text-2xl fa-solid fa-bars"></i>
        <nav class="hidden lg:flex gap-10 items-center">
            <p>Home</p>
            <p>Services</p>
            <p>Careers</p>
            <p>Career Details</p>
            <p>Contact</p>
        </nav>
        <button class="hidden lg:block bg-[#0A84FF] rounded-2xl py-3 px-8 text-white">Contact Us</button>
    </header>

<main>
    <section class="max-w-300 m-auto p-5 lg:px-0 lg:py-25 gap-5 flex flex-col lg:flex-row lg:items-center relative">
        <aside class="flex flex-col gap-5 items-start">
            <h1 class="text-4xl lg:text-6xl font-bold">Transforming Data into   <span class="px-1 lg:text-[50px] bg-[#0A84FF] rounded-2xl">Decisions</span></h1>
            <p class="text-[18px] lg:text-[20px]">Leverage the power of machine learning and AI to unlock insights and drive business growth</p>
            <button class="bg-[#0A84FF] rounded-2xl py-3 px-8 text-white font-bold">Book a Meeting</button>
            <div class="flex gap-4 items-center">
                <img src="src/img/pg1/section1/ava.png" alt="">
                <p class="text-[#FFFFFFCC] font-semibold text-[14px]">Over 100+ clients have worked with us</p>
            </div>
        </aside>
        <img class="lg:w-[50%]" src="src/img/pg1/section1/imgr.png" alt="">
        <img class="absolute hidden -left-35 lg:block -z-1" src="src/img/pg1/section1/fon.png" alt="">
    </section>
    <section class="max-w-300 m-auto items-center flex flex-col lg:flex-row gap-5 lg:gap-0 p-5 lg:px-0 lg:py-10 border-t border-b border-[#2A7AFE]">
        <img src="src/img/pg1/section2/card1.png" alt="">
        <img src="src/img/pg1/section2/card2.png" alt="">
        <img src="src/img/pg1/section2/card3.png" alt="">
        <img src="src/img/pg1/section2/card4.png" alt="">
        <img src="src/img/pg1/section2/card5.png" alt="">
        <img src="src/img/pg1/section2/card6.png" alt="">
    </section>
</main>
</body>
</html>
